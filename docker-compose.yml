version: "3.9"

services:
  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: hypesoft-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: HypesoftDb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hypesoft-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mongo Express (Admin UI) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: hypesoft-mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_SITE_BASEURL: /
    ports:
      - "8081:8081"
    networks:
      - hypesoft-net

  # ─── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: hypesoft-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - hypesoft-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q 'UP' && exit 0 || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s

  # ─── Backend (.NET 9) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Hypesoft.API/Dockerfile
    container_name: hypesoft-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      MongoDb__ConnectionString: mongodb://mongodb:27017
      MongoDb__DatabaseName: HypesoftDb
      Keycloak__Authority: http://keycloak:8080/realms/hypesoft
      Keycloak__Audience: hypesoft-api
      Frontend__Url: http://localhost:3000
    ports:
      - "5000:8080"
    networks:
      - hypesoft-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend (React) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hypesoft-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - hypesoft-net

  # ─── Nginx (Reverse Proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hypesoft-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hypesoft-net

  # ─── E2E Tests (Playwright) ────────────────────────────────────────────────
  playwright:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    container_name: hypesoft-e2e
    profiles: ["test"]
    depends_on:
      - nginx
    environment:
      BASE_URL: http://nginx
      KEYCLOAK_URL: http://keycloak:8080
    networks:
      - hypesoft-net

networks:
  hypesoft-net:
    driver: bridge

volumes:
  mongodb_data:
